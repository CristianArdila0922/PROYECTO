<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Contacto - Validación Visual</title>
    <link rel="stylesheet" href="style6.css">
</head>
<body>

    <div class="container">
        <h2>Contáctanos</h2>
        
        <form>
            <div class="form-group success">
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" placeholder="Ingrese su nombre" value="Ingrese su nombre">
                <span class="message">El nombre es válido.</span>
            </div>

            <div class="form-group error">
                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" placeholder="correo@gmal.com" value="correo@gmal.com">
                <span class="message">Por favor, introduce un correo electronico.</span>
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono:</label>
                <input type="tel" id="telefono" placeholder="Escribe tu teléfono" required>
                <span class="message-hint">Ingrese su numero de telefono </span>
            </div>

            <button type="submit">Enviar Mensaje</button>
        </form>

        <hr>

        <footer class="contact-info">
            <h3>Información de Contacto</h3>
            <p> Correo: DavidDominguez@gmail.com</p>
            <p> Teléfono: +57 3015942400</p>
            
            <div class="social-links">
                <a href="#">Facebook</a> | 
                <a href="https://www.instagram.com/patitas_felices_campuslands/">Instagram</a> | 
                <a href="https://www.tiktok.com/@patitas_felices07?lang=es-419">Tiktok</a>
            </div>
        </footer>
    </div>

</body>
</html>
