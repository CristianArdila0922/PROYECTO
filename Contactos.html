    <section class="secciones-personalizadas">
            <h2>CONTACTA CON NUESTRA FUNDACIÓN</h2>
            <form>
            <div class="form-group success">
                <label for="nombre"></label>
                <input type="text" id="nombre" placeholder="Ingrese su nombre" required>
                <span class="message"></span>
            </div>
            <br>
            <div class="form-group error">
                <label for="email"></label>
                <input type="email" id="email" placeholder="correo@gmal.com" required>
                <span class="message"></span>
            </div>
            <br>
            <div class="form-group">
                <label for="telefono"></label>
                <input type="tel" id="telefono" placeholder="Escribe tu teléfono" required>
                <span class="message-hint"></span>
            </div>
            <br>
            <button type="submit">Enviar Mensaje</button>
        </form>
